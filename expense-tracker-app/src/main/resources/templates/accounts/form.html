<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(${mode == 'create' ? 'New Account' : 'Edit Account'})}"></head>
<body>

<header th:replace="~{fragments/layout :: header ('accounts')}"></header>

<main>
    <div class = "container">
        <div class="page-header">
            <h1 th:text="${mode == 'create' ? 'New Account' : 'Edit Account'}">Account</h1>
            <a class="btn btn-ghost" th:href="@{/accounts}">← Back</a>
        </div>

        <div class="card">
            <form th:action="${mode == 'create' ? '/accounts' : '/accounts/' + accountForm.id}"
                  th:object="${accountForm}"
                  method="post">

                <div class="form-grid">

                    <div class="form-group">
                        <label for="name">Account name</label>
                        <input id="name"
                                type="text"
                                th:field="*{name}"
                                placeholder="e.g. Checking, Savings, Wallet"
                                required>
                        <span class="muted" style="font-size:.75rem;color:#e02424"
                              th:if="${fields.hasErrors('name')}"
                              th:errors="*{name}">Error</span>
                    </div>
                    <div class="form-group">
                        <label for="type">Account</label>
                        <select id="type" th:field="*{type}" required>
                            <option value="">- select type -</option>
                            <option value="CHECKING">Checking</option>
                            <option value="SAVINGS">Savings</option>
                            <option value="CREDIT_CARD">Credit Card</option>
                            <option value="CASH">Cash</option>
                        </select>
                        <span class="muted" style ="font-size:.75rem;color:#e02424"
                              th:if="${fields.hasErrors('type')}"
                              th:errors="*{type}">Error</span>
                    </div>
                    <div class="form-group">
                        <label for="openingBalance">Opening Balance ($)</label>
                        <input id="openingBalance"
                               type="number"
                               th:field="*{openingBalance}"
                               step="0.01"
                               min="0.00"
                               placeholder="0.00">
                        <span class="muted" style="font-size:.75rem;color:#e02424"
                              th:if="${fields.hasErrors('openingBalance')}"
                              th:errors="*{openingBalance}">Error</span>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <a class="btn btn-ghost" th:href="@{/accounts}">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
