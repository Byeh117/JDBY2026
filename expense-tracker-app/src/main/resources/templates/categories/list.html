<!DOCTYPE html>
<html lang="en">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>

<header th:replace="~{fragments/layout :: header('categories')}"></header>

<main>
    <div class="container">
        <div class="page-header">
            <h1>Categories</h1>
            <a class="btn btn-primary" th:href="@{/categories/new}">+ New Category</a>
        </div>
        <div th:if="${success}"
             style="background:#ecfdf5;
             border:1px solid #6ee7b7;
             color:#065f46;
             padding:.75rem 1rem;
             border-radius:8px;
             margin-bottom:1.25rem"
             th:text="${success}">Success</div>

        <div th:if="${errorMessage}"
             style="background:#fef2f2;
             border:1px solid #fca5a5;
             color:#991b1b;
             padding:.75rem 1rem;
             border-radius:8px;
             margin-bottom:1.25rem"
             th:text="${errorMessage}">Error</div>

        <div class="card">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Type</th>
                        <th class="text-right">Transactions</th>
                        <th></th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="cat : ${categories}">
                        <td th:text="${cat.name"}>Groceries</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${cat.type.name() == 'EXPENSE'} ? 'badge-expense : 'badge-income'"
                                  th:text="${cat.type}">EXPENSE</span>
                        </td>
                        <td class="text-right">
                            <a th:href="@{/transactions(categordId=${cat.id})}"
                               th:text="${txCountByCategory.getOrDefault(cat.id, 0L)}"
                               style="color:var(--brand);font-family:'DM Mono',monospace;font-size:.825rem">0</a>
                        </td>
                        <td>
                            <div class="actions">
                                <form class="btn btn-ghost btn-sm"
                                   th:href="@{/categories{id}/edit(id-@{cat.id})}"
                                   method="post"
                                   onsubmit="return confirm('Delete this category')">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categories)}">
                        <td colspan="4" class="muted" style="padding:1.5rem;text-align:center">
                            No categories found.
                            <a th:href="@{/categories/new}">Create one →</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
