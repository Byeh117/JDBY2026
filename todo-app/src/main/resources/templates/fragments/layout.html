<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Todo App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;600&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>

<header th:fragment="header(title)">
    <div class="container nav">
        <a class="brand" th:href="@{/todos}">Todo App</a>
        <a class="btn btn-primary" th:href="@{/todos/new}">+ New Todo</a>
    </div>
</header>

<footer th:fragment="footer">
    <div class="container muted">
        <small>Spring Boot + Thymeleaf - Tutorial Build</small>
    </div>
</footer>

</body>
</html>
